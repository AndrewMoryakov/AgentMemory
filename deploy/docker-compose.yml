# AgentMemory server deployment.
#
# Runs the HTTP API + remote-MCP endpoint behind the existing Traefik
# ingress on andrewm.ru/agentmemory/. The container joins the
# netbird_netbird bridge so Traefik can reach it via `http://agentmemory:8765`,
# mirroring how the other NetBird-local services are routed. Public
# ingress is terminated by Traefik only; no host port is exposed.
#
# Required env (see .env.example):
#   AGENTMEMORY_API_TOKEN    strong bearer token, shared with MCP clients
#   OPENROUTER_API_KEY       only needed for the mem0 provider
#
# Usage (on the server):
#   cd /opt/agentmemory
#   cp .env.example .env && edit .env
#   deploy/redeploy.sh
#
# Do not "simplify" deploys back to raw `docker compose up` without reading
# docs/COMPOSE_V2_NETWORK_DRIFT.md first. This stack depends on an external
# network (`netbird_netbird`), and Compose v2 has been observed on the target
# host bringing the container back without that declared attachment.

services:
  agentmemory:
    build:
      context: ..
      dockerfile: Dockerfile
    image: agentmemory:latest
    container_name: agentmemory
    restart: unless-stopped
    depends_on:
      - agentmemory-proxy
    # Container-level healthcheck. Passes while the HTTP server responds;
    # does NOT verify the proxy chain works — that's intentional because
    # embedding-provider availability shouldn't flap the container state.
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request,sys; sys.exit(0 if urllib.request.urlopen('http://127.0.0.1:8765/health', timeout=2).status==200 else 1)"]
      interval: 15s
      timeout: 5s
      retries: 5
      start_period: 20s
    environment:
      AGENTMEMORY_API_HOST: "0.0.0.0"
      AGENTMEMORY_API_PORT: "8765"
      AGENTMEMORY_API_TOKEN: "${AGENTMEMORY_API_TOKEN:?set AGENTMEMORY_API_TOKEN in .env}"
      AGENTMEMORY_OAUTH_CLIENT_ID: "${AGENTMEMORY_OAUTH_CLIENT_ID:-}"
      AGENTMEMORY_OAUTH_CLIENT_SECRET: "${AGENTMEMORY_OAUTH_CLIENT_SECRET:-}"
      AGENTMEMORY_PUBLIC_URL: "${AGENTMEMORY_PUBLIC_URL:-}"
      OPENROUTER_API_KEY: "${OPENROUTER_API_KEY:-}"
      # Outbound HTTP via xray sidecar. This host VPS is region-blocked
      # by several OpenRouter embedding providers; tunnelling through
      # the secondary host (see xray-proxy.json) restores access.
      HTTP_PROXY: "http://agentmemory-proxy:1081"
      HTTPS_PROXY: "http://agentmemory-proxy:1081"
      NO_PROXY: "localhost,127.0.0.1,agentmemory,agentmemory-proxy"
    networks:
      - traefik
      - internal
    volumes:
      - agentmemory_data:/app/data
      # Seed runtime config into the image's BASE_DIR so the provider
      # starts in localjson mode without a separate `configure` step.
      # Edit deploy/agentmemory.config.json to switch provider.
      - ./agentmemory.config.json:/app/agentmemory.config.json:ro

  # VLESS+Reality tunnel to the secondary host (216.57.105.129) that
  # isn't subject to the embedding-provider IP blocks on this VPS.
  # Exposes SOCKS5 (1080) and HTTP CONNECT (1081) on the internal net.
  agentmemory-proxy:
    image: teddysun/xray:latest
    container_name: agentmemory-proxy
    restart: unless-stopped
    # Xray has no /health; TCP liveness on the HTTP-CONNECT inbound is
    # enough to catch config-load failures and crashes.
    healthcheck:
      test: ["CMD", "nc", "-z", "127.0.0.1", "1081"]
      interval: 20s
      timeout: 3s
      retries: 5
      start_period: 10s
    volumes:
      - ./xray-proxy.json:/etc/xray/config.json:ro
    networks:
      - internal

networks:
  traefik:
    external: true
    name: netbird_netbird
  internal:

volumes:
  agentmemory_data:
