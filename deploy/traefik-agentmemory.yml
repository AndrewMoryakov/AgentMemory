# Traefik dynamic file-provider config for AgentMemory.
#
# Install as: /root/netbird/traefik-conf/agentmemory.yml
#
# Routes andrewm.ru/agentmemory/* to the agentmemory container which
# joins the netbird_netbird network (see deploy/docker-compose.yml).
# The stripPrefix middleware removes /agentmemory before forwarding,
# so the app keeps serving /health, /mcp, etc. on its native paths.

http:
  routers:
    agentmemory:
      rule: "Host(`andrewm.ru`) && PathPrefix(`/agentmemory`)"
      entrypoints: [websecure]
      tls:
        certResolver: letsencrypt
      service: agentmemory
      priority: 80
      middlewares:
        - agentmemory-strip

    # OAuth/MCP clients (Claude.ai, ChatGPT) do RFC 8414/9728 discovery
    # at the host root, not under the /agentmemory prefix. Match those
    # root well-known paths explicitly and forward without stripping so
    # the app can handle both path-infixed and host-root variants.
    agentmemory-wellknown:
      rule: "Host(`andrewm.ru`) && PathPrefix(`/.well-known/oauth-`)"
      entrypoints: [websecure]
      tls:
        certResolver: letsencrypt
      service: agentmemory
      priority: 150

  services:
    agentmemory:
      loadBalancer:
        servers:
          - url: "http://agentmemory:8765"
        passHostHeader: true

  middlewares:
    agentmemory-strip:
      stripPrefix:
        prefixes:
          - "/agentmemory"
