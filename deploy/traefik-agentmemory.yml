# Traefik dynamic file-provider config for AgentMemory.
#
# Install as: /root/netbird/traefik-conf/agentmemory.yml
#
# Routes agentmemorytool.duckdns.org/* to the agentmemory container which
# joins the netbird_netbird network (see deploy/docker-compose.yml).
# The container serves /health, /mcp, /.well-known/oauth-* on the host root,
# so no stripPrefix is needed.

http:
  routers:
    agentmemory:
      rule: "Host(`agentmemorytool.duckdns.org`)"
      entrypoints: [websecure]
      tls:
        certResolver: letsencrypt
      service: agentmemory
      priority: 80

  services:
    agentmemory:
      loadBalancer:
        servers:
          - url: "http://agentmemory:8765"
        passHostHeader: true
        # Traefik-level healthcheck so backend drift surfaces as 503
        # (service-unavailable, self-describing) instead of 502
        # (bad-gateway, hides network/DNS misattachment).
        healthCheck:
          path: /health
          interval: "15s"
          timeout: "3s"
